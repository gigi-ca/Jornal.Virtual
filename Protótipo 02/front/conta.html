<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Usuário</title>

  <link rel="stylesheet" href="style2.css">
</head>
 <a href="javascript:history.back()" class="btn-voltar">
  Voltar
</a>
<body>

  <div class="perfil">

    <div class="topo">
      <img src="banner.jpg" class="banner">
    </div>

    <img 
      id="foto"
      class="foto"
      src="perfil.jpg"
      alt="Foto do usuário"
    >

    <div class="conteudo">

      <h1 class="nome" id="nome">Luiza Corazin</h1>

      <p class="info">
        <strong>Unidade Escolar:</strong>
        <span id="unidade">SESI Campinas</span>
      </p>

      <p class="descricao" id="descricao">
        Estudante criativa e apaixonada por tecnologia,
        design e jornal virtual escolar.
      </p>

      <div class="categoria" id="categoria">
        Administradora
      </div>

      <br>

      <!-- BOTÃO CORRETO -->
      <button onclick="abrirModal()">
        Editar Perfil
      </button>

      <!-- MODAL -->
      <div class="modal-fundo" id="modalFundo">

        <div class="modal">

          <h2>Editar Perfil</h2>

          <input type="text" id="inputNome" placeholder="Digite o nome">
          <input type="text" id="inputUnidade" placeholder="Digite a unidade escolar">
          <input type="text" id="inputCategoria" placeholder="Digite a categoria">
          <input type="text" id="inputFoto" placeholder="Foto do perfil">
          <input type="text" id="inputBanner" placeholder="Imagem do topo">

          <textarea id="inputDescricao" placeholder="Descrição"></textarea>

          <button onclick="salvarPerfil()">
            Salvar
          </button>

          <button class="btn-fechar" onclick="fecharModal()">
            Fechar
          </button>

        </div>

      </div>

    </div>
  </div>

  <script src="script2.js"></script>
</body>
</html>
