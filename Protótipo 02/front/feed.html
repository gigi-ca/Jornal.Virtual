<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Social</title>

<link rel="stylesheet" href="feed.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

</head>
<body>

<header class="topo">
  <div class="header-inner">
    <div class="logo">
      <img src="newss.png" alt="Logo">
    </div>
    <nav class="nav-principal">
      <a href="feed.html" class="current">Feed</a>
      <a href="inicio.html">Início</a>
    

      <a href="conta.html">Minha conta</a>
      <a href="configuracoes.html">Configurações</a>
    </nav>
  </div>
</header>

<div class="container">

    <div class="esquerda">

        <div class="card">
            <h2>Nova publicação</h2>

   

            <textarea
                id="texto"
                placeholder="O que está acontecendo? Use hashtags..."
            ></textarea>

            <button id="publicar">
                Publicar
            </button>
        </div>

        <div class="card">
            <h2>  Hashtags em Alta</h2>

            <canvas
                id="nuvem"
                width="500"
                height="350"
            ></canvas>
        </div>

    </div>

    <div class="feed">

        <h2>Feed</h2>

        <div id="listaPublicacoes"></div>

    </div>


</div>

<div id="modalHashtags" class="modal">
  <div class="modal-content modal-hashtags-content">
    <button class="close-modal" onclick="fecharHashtagsModal()" aria-label="Fechar modal">×</button>
    <h2>Hashtags em Alta</h2>
    <ul id="listaHashtags"></ul>
  </div>
</div>

<script src="feed.js"></script>

</body>
</html>
